name: LuckyBlock
version: '1.0'
main: com.lucky.luckyblock.LuckyBlockPlugin
api-version: '1.21'
author: PluggLAB studio
description: Feature-rich Lucky Block plugin with luck system, custom drops, structures, crafting and PlaceholderAPI support.
softdepend: [PlaceholderAPI]

commands:
  luckyblock:
    description: Main command for LuckyBlock plugin
    aliases: [lb, lucky]
    usage: |
      /luckyblock gui
      /luckyblock give <player> [amount]
      /luckyblock setluck <player> <-100..100>
      /luckyblock addluck <player> <amount>
      /luckyblock getluck [player]
      /luckyblock reload
      /luckyblock list
    permission: luckyblock.use

permissions:
  luckyblock.use:
    description: Allows basic usage of /luckyblock
    default: true
  luckyblock.admin:
    description: Allows giving lucky blocks, managing luck and reloading config
    default: op
