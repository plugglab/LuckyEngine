# =========================================================
#  LuckyBlock v1.0 Configuration
# =========================================================

# Language to use for all player-facing messages.
# Available: en_US, pl_PL
# Lang files are in plugins/LuckyBlock/lang/
language: en_US

# Material used to represent the Lucky Block in the world
lucky-block-material: PLAYER_HEAD

# Should the lucky block suppress its normal item drop?
suppress-normal-drop: true

# ─── LUCK SYSTEM ─────────────────────────────────────────
# Each player has a luck value from -100 (very unlucky) to +100 (very lucky).
# Luck shifts the weighted random selection: positive luck biases toward
# rewards tagged with tier: GOOD or GREAT; negative luck biases toward BAD.
default-luck: 0

# Min and max possible luck values
luck-min: -100
luck-max: 100

# How much luck changes after each break (0 = disabled)
luck-drift-after-break: 0

# Reset player luck to default-luck on death
luck-reset-on-death: false

# ─── COOLDOWNS ───────────────────────────────────────────
# Seconds a player must wait between breaking lucky blocks (0 = no cooldown)
cooldown-seconds: 0
cooldown-message: "&cYou must wait &e%seconds%s &cbefore breaking another Lucky Block!"

# ─── WORLD RESTRICTIONS ──────────────────────────────────
# List worlds where lucky blocks are active. Leave empty to allow all worlds.
allowed-worlds: []
# Example:
# allowed-worlds:
#   - world
#   - world_nether

# ─── TOOL RESTRICTION ────────────────────────────────────
# Require a specific tool to break lucky blocks (ANY = no restriction)
# Examples: GOLDEN_PICKAXE, DIAMOND_PICKAXE, ANY
required-tool: ANY

# ─── RARITY ──────────────────────────────────────────────
# Each rarity applies a one-time luck bonus to the random roll when broken.
# The bonus is added to the player's base luck (capped at luck-max).
# Craft gives COMMON. Higher rarities must be given via /lb give or the GUI.
rarity:
  common:
    luck-bonus: 0
    display-name: "&aCommon"
  rare:
    luck-bonus: 15
    display-name: "&9Rare"
  epic:
    luck-bonus: 30
    display-name: "&5Epic"
  legendary:
    luck-bonus: 50
    display-name: "&6&lLegendary"

# ─── CRAFTING ────────────────────────────────────────────
crafting:
  enabled: true
  shape:
    - "GGG"
    - "GDG"
    - "GGG"
  ingredients:
    G: GOLD_BLOCK
    D: DISPENSER
  result-amount: 1

# ─── EFFECTS ─────────────────────────────────────────────
effects:
  break-particle: TOTEM_OF_UNDYING
  break-sound: ENTITY_PLAYER_LEVELUP
  sound-volume: 1.0
  sound-pitch: 1.0
  particle-count: 60

# ─── HUD ─────────────────────────────────────────────────
hud:
  # Show the luck/tier info box in chat when a lucky block is broken
  enabled: true

# ─── BROADCAST ───────────────────────────────────────────
# Only GREAT (Legendary) tier rewards are broadcast to the whole server.
# GOOD, NEUTRAL and BAD rewards show only to the player who broke the block.
broadcast-rewards: true
prefix: "&6[&eLucky&6] &r"
